name: ci
on:
  push:
    tags:
      - v*
    branches:
      - master
      - main
      - feature/**
  pull_request:
permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read
jobs:
  build:
    name: run
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.26.x', 'stable']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: |
            go.sum
            examples/go.sum
            docs/go.sum

      - name: Build
        run: go build ./...

      - name: Build examples module
        run: go build ./...
        working-directory: examples

      # Guard wasm compatibility for both modules. These mirror the build steps
      # above (same workspace resolution via go.work — the examples module
      # depends on local-only paper packages and only builds under the
      # workspace) and run on every matrix Go version.
      - name: Build wasm (js/wasm)
        run: GOOS=js GOARCH=wasm go build ./...

      - name: Build wasm (js/wasm) examples module
        run: GOOS=js GOARCH=wasm go build ./...
        working-directory: examples

      - name: Test
        run: go test -v ./...

      - name: Dead code check
        # Findings go to stdout only; stderr stays on the job log so module
        # download notices ("go: downloading ...") can't trip the gate.
        run: |
          go run golang.org/x/tools/cmd/deadcode@latest -test ./... > deadcode.out
          if [ -s deadcode.out ]; then
            echo "Dead code found:"
            cat deadcode.out
            exit 1
          fi

      - name: Test examples module
        run: go test -v ./...
        working-directory: examples

      - name: Test docs examples module
        run: go test -v ./assets/examples/...
        working-directory: docs
