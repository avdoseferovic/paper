name: ci
on:
  push:
    tags:
      - v*
    branches:
      - master
      - main
      - feature/**
  pull_request:
permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read
jobs:
  build:
    name: run
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.26.x', 'stable']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: |
            go.sum
            examples/go.sum
            docs/go.sum

      - name: Build
        run: go build ./...

      - name: Build examples module
        run: go build ./...
        working-directory: examples

      - name: Test
        run: go test -v ./...

      - name: Fuzz FromHTML smoke
        run: go test -run='^$' -fuzz=FuzzFromHTML -fuzztime=60s .

      - name: Fuzz CSS smoke
        run: go test -run='^$' -fuzz=FuzzParseStylesheet -fuzztime=30s ./pkg/html/css

      - name: Fuzz SVG smoke
        run: go test -run='^$' -fuzz=FuzzRasterize -fuzztime=30s ./internal/svg

      - name: Dead code check
        run: |
          go run golang.org/x/tools/cmd/deadcode@latest -test ./... > deadcode.out 2>&1 || true
          if [ -s deadcode.out ]; then
            echo "Dead code found:"
            cat deadcode.out
            exit 1
          fi

      - name: Test pkg/test module
        run: go test -v ./...
        working-directory: pkg/test

      - name: Test examples module
        run: go test -v ./...
        working-directory: examples

      - name: Test docs examples module
        run: go test -v ./assets/examples/...
        working-directory: docs
