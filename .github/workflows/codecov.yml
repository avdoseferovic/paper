name: coverage
on:
  push:
    tags:
      - v*
    branches:
      - master
      - main
  pull_request:
permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read
jobs:
  codecov:
    name: publish
    runs-on: ubuntu-latest
    steps:

      - name: Check out code into the Go module directory
        uses: actions/checkout@v4

      - name: Set up Go 1.26.4
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
        id: go

      - name: Download root dependencies
        run: go mod download

      - name: Download examples dependencies
        run: go mod download
        working-directory: examples

      - name: Download docs dependencies
        run: go mod download
        working-directory: docs

      - name: Generate root coverage report
        run: go test ./... -coverprofile=coverage.txt -covermode=atomic

      - name: Generate examples coverage report
        run: go test ./... -coverprofile=coverage.txt -covermode=atomic
        working-directory: examples

      - name: Generate docs examples coverage report
        run: go test ./assets/examples/... -coverprofile=coverage.txt -covermode=atomic
        working-directory: docs

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: root
          name: codecov-umbrella
          disable_search: true
          fail_ci_if_error: true

      - name: Upload examples coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./examples/coverage.txt
          flags: examples
          name: codecov-examples
          disable_search: true
          fail_ci_if_error: true

      - name: Upload docs examples coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./docs/coverage.txt
          flags: docs-examples
          name: codecov-docs-examples
          disable_search: true
          fail_ci_if_error: true
