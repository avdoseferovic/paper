<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Paper HTML translation pipeline diagram</title>
  <desc id="desc">A diagram showing HTML and CSS input being parsed and translated into Paper rows, columns, and components before PDF rendering.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8a99"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#12355b" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #fbfcfe; }
      .panel { fill: #ffffff; stroke: #d3dbe5; stroke-width: 2; rx: 8; filter: url(#shadow); }
      .open { fill: none; stroke: #d3dbe5; stroke-width: 1.8; rx: 8; }
      .rule { stroke: #d3dbe5; stroke-width: 2; fill: none; }
      .arrow { stroke: #7c8a99; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .ink { fill: #1f2937; }
      .muted { fill: #5e6975; }
      .brand { fill: #12355b; }
      .blue { fill: #3164b3; }
      .teal { fill: #24807c; }
      .amber { fill: #d88e36; }
      .red { fill: #b44949; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .body { font-family: Helvetica, Arial, sans-serif; font-size: 15px; }
      .small { font-family: Helvetica, Arial, sans-serif; font-size: 13px; }
      .tiny { font-family: Helvetica, Arial, sans-serif; font-size: 11.5px; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text x="64" y="72" class="brand" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700">HTML to Paper pipeline</text>
  <text x="64" y="104" class="muted body">HTML is translated into the same row, column, and component primitives used by explicit Go layouts.</text>
  <line x1="64" y1="128" x2="1136" y2="128" class="rule"/>

  <g transform="translate(74 176)">
    <rect width="300" height="382" class="panel"/>
    <text x="28" y="40" class="blue label">HTML + CSS source</text>
    <text x="28" y="70" class="muted small">Existing markup becomes a full document,</text>
    <text x="28" y="88" class="muted small">appended rows, or one embedded component.</text>
    <g transform="translate(28 106)">
      <rect width="244" height="196" rx="7" fill="#12355b"/>
      <text x="18" y="34" class="mono" fill="#ffffff">&lt;section class="report"&gt;</text>
      <text x="18" y="62" class="mono" fill="#e2f3f0">  &lt;h2&gt;Summary&lt;/h2&gt;</text>
      <text x="18" y="90" class="mono" fill="#fbf1dc">  &lt;div class="kpis"&gt;</text>
      <text x="18" y="118" class="mono" fill="#f9e8e8">  &lt;table&gt;...&lt;/table&gt;</text>
      <text x="18" y="146" class="mono" fill="#e7eef9">  &lt;svg&gt;...&lt;/svg&gt;</text>
      <text x="18" y="174" class="mono" fill="#ffffff">&lt;/section&gt;</text>
    </g>
    <text x="28" y="340" class="mono teal">paper.FromHTML(html)</text>
  </g>

  <path d="M 396 360 L 462 360" class="arrow"/>

  <g transform="translate(472 176)">
    <text x="0" y="0" class="brand label">Translator stages</text>
    <g transform="translate(0 38)">
      <circle cx="14" cy="14" r="14" fill="#3164b3"/>
      <text x="10" y="19" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">1</text>
      <text x="44" y="19" class="ink body">Parse DOM and normalize CSS</text>
    </g>
    <g transform="translate(0 90)">
      <circle cx="14" cy="14" r="14" fill="#24807c"/>
      <text x="10" y="19" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">2</text>
      <text x="44" y="19" class="ink body">Map blocks, flex, tables, and inline runs</text>
    </g>
    <g transform="translate(0 142)">
      <circle cx="14" cy="14" r="14" fill="#d88e36"/>
      <text x="10" y="19" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">3</text>
      <text x="44" y="19" class="ink body">Rasterize SVG/image content when needed</text>
    </g>
    <g transform="translate(0 194)">
      <circle cx="14" cy="14" r="14" fill="#b44949"/>
      <text x="10" y="19" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">4</text>
      <text x="44" y="19" class="ink body">Emit Paper rows and components</text>
    </g>
    <rect x="0" y="280" width="310" height="102" class="open"/>
    <text x="20" y="313" class="teal label">Same layout engine</text>
    <text x="20" y="342" class="muted small">Translated rows use regular measurement,</text>
    <text x="20" y="360" class="muted small">page breaks, headers, footers, and cell styling.</text>
  </g>

  <path d="M 790 360 L 856 360" class="arrow"/>

  <g transform="translate(874 164)">
    <rect width="248" height="456" class="panel"/>
    <text x="24" y="42" class="brand label">PDF output</text>
    <text x="24" y="68" class="muted tiny">Generated by provider-backed Paper components</text>
    <rect x="28" y="96" width="192" height="282" fill="#ffffff" stroke="#d3dbe5" stroke-width="1.5" rx="5"/>
    <rect x="46" y="116" width="156" height="28" fill="#e7eef9" stroke="#3164b3" stroke-width="1.2" rx="3"/>
    <rect x="46" y="162" width="48" height="46" fill="#e2f3f0" stroke="#24807c" stroke-width="1.2" rx="3"/>
    <rect x="101" y="162" width="48" height="46" fill="#fbf1dc" stroke="#d88e36" stroke-width="1.2" rx="3"/>
    <rect x="156" y="162" width="46" height="46" fill="#f9e8e8" stroke="#b44949" stroke-width="1.2" rx="3"/>
    <rect x="46" y="232" width="156" height="84" fill="#ffffff" stroke="#d3dbe5" stroke-width="1.2" rx="3"/>
    <line x1="46" y1="256" x2="202" y2="256" stroke="#12355b" stroke-width="9"/>
    <line x1="46" y1="278" x2="202" y2="278" stroke="#d3dbe5" stroke-width="1.2"/>
    <line x1="98" y1="232" x2="98" y2="316" stroke="#d3dbe5" stroke-width="1.2"/>
    <line x1="150" y1="232" x2="150" y2="316" stroke="#d3dbe5" stroke-width="1.2"/>
    <rect x="46" y="338" width="156" height="20" fill="#e7eef9" stroke="#3164b3" stroke-width="1.2" rx="3"/>
    <text x="44" y="414" class="mono teal">doc.Save("out.pdf")</text>
  </g>

  <g transform="translate(74 664)">
    <text x="0" y="0" class="brand label">Integration choices</text>
    <text x="0" y="32" class="ink small">Full document: paper.FromHTML</text>
    <text x="310" y="32" class="ink small">Append to Paper: m.AddHTML</text>
    <text x="606" y="32" class="ink small">Inside a column: htmlcomponent.New</text>
  </g>
</svg>
